<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Diagonal crossing lines — structural "wiring" aesthetic -->
  <!-- Primary diagonals -->
  <line x1="0" y1="0" x2="400" y2="400" stroke="currentColor" stroke-width="0.5" stroke-opacity="0.06"/>
  <line x1="400" y1="0" x2="0" y2="400" stroke="currentColor" stroke-width="0.5" stroke-opacity="0.06"/>
  <!-- Secondary diagonals -->
  <line x1="0" y1="100" x2="300" y2="400" stroke="currentColor" stroke-width="0.5" stroke-opacity="0.04"/>
  <line x1="100" y1="0" x2="400" y2="300" stroke="currentColor" stroke-width="0.5" stroke-opacity="0.04"/>
  <line x1="400" y1="100" x2="100" y2="400" stroke="currentColor" stroke-width="0.5" stroke-opacity="0.04"/>
  <line x1="300" y1="0" x2="0" y2="300" stroke="currentColor" stroke-width="0.5" stroke-opacity="0.04"/>
  <!-- Intersection markers -->
  <circle cx="200" cy="200" r="2" fill="currentColor" fill-opacity="0.1"/>
  <circle cx="100" cy="100" r="1.5" fill="currentColor" fill-opacity="0.06"/>
  <circle cx="300" cy="100" r="1.5" fill="currentColor" fill-opacity="0.06"/>
  <circle cx="100" cy="300" r="1.5" fill="currentColor" fill-opacity="0.06"/>
  <circle cx="300" cy="300" r="1.5" fill="currentColor" fill-opacity="0.06"/>
  <!-- Horizontal/vertical cross -->
  <line x1="200" y1="0" x2="200" y2="400" stroke="currentColor" stroke-width="0.5" stroke-opacity="0.03"/>
  <line x1="0" y1="200" x2="400" y2="200" stroke="currentColor" stroke-width="0.5" stroke-opacity="0.03"/>
</svg>

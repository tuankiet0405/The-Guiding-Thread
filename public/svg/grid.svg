<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Structural grid pattern — "Show the Wiring" axiom -->
  <defs>
    <pattern id="grid-sm" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 0 40" stroke="currentColor" stroke-width="0.5" stroke-opacity="0.08"/>
    </pattern>
    <pattern id="grid-lg" width="200" height="200" patternUnits="userSpaceOnUse">
      <rect width="200" height="200" fill="url(#grid-sm)"/>
      <path d="M200 0 L0 0 0 200" stroke="currentColor" stroke-width="1" stroke-opacity="0.12"/>
    </pattern>
  </defs>
  <rect width="400" height="400" fill="url(#grid-lg)"/>
</svg>
